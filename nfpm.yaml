# nfpm config — static Cockpit plugin, no build step.
# Usage: VERSION=1.0.0 nfpm package -f nfpm.yaml -p deb -t out/
name: cockpit-gpstak
arch: all
platform: linux
version: ${VERSION}
release: "1"
section: web
priority: optional
maintainer: "Sensors & Signals LLC <oss@snstac.com>"
vendor: "Sensors & Signals LLC"
homepage: https://github.com/snstac/cockpit-gpstak
license: Apache-2.0
description: |
  Cockpit web console plugin for GPSTAK, the Network GPS for TAK: feed a
  device's onboard GNSS position to ATAK and WinTAK over the network.

depends:
  - cockpit-bridge
recommends:
  - gpstak

contents:
  - src: ./gpstak.css
    dst: /usr/share/cockpit/gpstak/gpstak.css
  - src: ./gpstak.js
    dst: /usr/share/cockpit/gpstak/gpstak.js
  - src: ./index.html
    dst: /usr/share/cockpit/gpstak/index.html
  - src: ./manifest.json
    dst: /usr/share/cockpit/gpstak/manifest.json
