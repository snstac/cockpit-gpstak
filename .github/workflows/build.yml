name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin files
        run: |
          node --check *.js
          python3 -c "import json; json.load(open('manifest.json'))"

      - name: Install nfpm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          NFPM_VERSION=2.41.3
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb" -o /tmp/nfpm.deb
          sudo apt-get install -y /tmp/nfpm.deb

      - name: Package deb + rpm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          export VERSION="${GITHUB_REF_cockpit-gpstak#v}"
          mkdir -p out
          nfpm package -f nfpm.yaml -p deb -t out/
          nfpm package -f nfpm.yaml -p rpm -t out/
          cp out/cockpit-gpstak_*_all.deb out/cockpit-gpstak_latest_all.deb
          ls -la out/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_cockpit-gpstak}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_cockpit-gpstak}" --title "${GITHUB_REF_cockpit-gpstak}" --generate-notes
          gh release upload "${GITHUB_REF_cockpit-gpstak}" out/* --clobber
